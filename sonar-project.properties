# SonarQube Project Configuration
# This is a simple configuration for college project demonstration

sonar.projectKey=shopsphere-ecommerce
sonar.projectName=ShopSphere E-commerce Microservices
sonar.projectVersion=1.0

# Source and test directories
sonar.sources=.
sonar.inclusions=**/*.java,**/*.xml,**/*.properties,**/*.yml,**/*.yaml
sonar.exclusions=**/target/**,**/.idea/**,**/.vscode/**,**/node_modules/**,**/*.jar

# Test configuration
sonar.tests=.
sonar.test.inclusions=**/src/test/**/*.java

# Java-specific settings
sonar.java.source=17
sonar.java.binaries=**/target/classes

# Code quality settings (relaxed for college project)
sonar.qualitygate.wait=true

# Skip some rules for simplicity
sonar.coverage.exclusions=**/*Application.java,**/config/**,**/model/**
